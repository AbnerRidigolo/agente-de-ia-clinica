services:
  agente:
    build: .
    container_name: agente-clinica
    restart: unless-stopped # garante o agente de pé 24/7 (sobe junto com o servidor)
    ports:
      - "3001:3001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-openai/gpt-oss-120b:free}
      - AGENT_MAX_TOKENS=${AGENT_MAX_TOKENS:-512}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-http://localhost:3001}
      - OPENROUTER_APP_NAME=${OPENROUTER_APP_NAME:-Agente Clinica Sofia}
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
