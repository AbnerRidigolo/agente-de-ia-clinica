services:
  agente:
    build: .
    container_name: agente-clinica
    restart: unless-stopped # garante o agente de pé 24/7 (sobe junto com o servidor)
    ports:
      - "3001:3001"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AGENT_MODEL=${AGENT_MODEL:-claude-opus-4-8}
    volumes:
      - ./server/data:/app/server/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
